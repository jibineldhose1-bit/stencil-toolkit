<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stencil Toolkit</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>

<header>
    <h1>Stencil Toolkit</h1>
    <p>Convert stencil images into dotted outline PNGs</p>
</header>

<main>

<div class="card">

<input
type="file"
id="imageInput"
accept="image/png,image/jpeg">

</div>

<div class="card">

<h2>Original Image</h2>

<img
id="previewImage"
style="display:none;width:100%;height:auto;border-radius:10px;">

</div>

<div class="card">

  <div class="setting">

    <label for="borderThickness">
        Border Thickness
        <span id="borderValue">1.0 px</span>
    </label>

    <input
        type="range"
        id="borderThickness"
        min="0.5"
        max="2"
        step="0.1"
        value="1">

</div>  
<button id="convertBtn">
Convert
</button>

<button id="downloadBtn">
Download PNG
</button>

</div>

<div class="card">

<h2>Converted Image</h2>

<canvas id="outputCanvas"></canvas>

</div>

</main>

<script src="app.js"></script>

</body>
</html>
