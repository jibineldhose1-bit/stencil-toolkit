<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stencil Toolkit</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>

<header>
    <h1>Stencil Toolkit</h1>
    <p>Convert stencil images into dotted outline PNGs</p>
</header>

<main>

<div class="card">

<input
type="file"
id="imageInput"
accept="image/png,image/jpeg">

</div>

<div class="card">

<h2>Original Image</h2>

<img
id="previewImage"
style="display:none;width:100%;height:auto;border-radius:10px;">

</div>

<div class="card">

  <div class="setting">

    <label for="borderThickness">
        Border Thickness
        <span id="borderValue">1.0 px</span>
    </label>

    <input
        type="range"
        id="borderThickness"
        min="0.5"
        max="2"
        step="0.1"
        value="1">

</div> 
<div class="card">

    <!-- Border Thickness -->
    <div class="setting">
    </div>

    <!-- INSERT HERE -->

    <div class="setting">

        <label for="dotSize">
            Dot Size
            <span id="dotSizeValue">3 px</span>
        </label>

        <input
            type="range"
            id="dotSize"
            min="1"
            max="6"
            step="0.5"
            value="3">

    </div>

    <div class="setting">

        <label for="dotSpacing">
            Dot Spacing
            <span id="dotSpacingValue">12 px</span>
        </label>

        <input
            type="range"
            id="dotSpacing"
            min="6"
            max="20"
            step="1"
            value="12">

    </div>

    <button id="convertBtn">
        Convert
    </button>

    <button id="downloadBtn">
        Download PNG
    </button>

</div>

</div>

<div class="card">

<h2>Converted Image</h2>

<canvas id="outputCanvas"></canvas>

</div>

</main>

<script src="mask.js"></script>
<script src="dots.js"></script>
<script src="render.js"></script>
<script src="download.js"></script>
<script src="app.js"></script>
</body>
</html>
